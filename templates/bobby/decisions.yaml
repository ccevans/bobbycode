# Bobby Architectural Decision Log
#
# Seeded by `bobby run arch`. Updated via `bobby learn` or manually.
# Format:
#   id:          kebab-case unique identifier
#   fact:        the decision or constraint as a declarative statement
#   decided:     ISO date (approximate if unknown)
#   ticket:      TKT-XXXX if traceable, "arch" for structural decisions
#   why:         the reason — include the incident or constraint that drove it
#   supersedes:  id of the decision this replaces (null if none)
#   invalidated: ISO date this decision was overturned (null if still active)
#
# To record a new decision: add an entry below
# To invalidate: set invalidated to today's date and add a new superseding entry

---

